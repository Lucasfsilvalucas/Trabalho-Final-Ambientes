<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Social - Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card hero">
      <h1>App Social</h1>
      <p class="subtitle">Crie uma página de perfil simples com nome, e-mail e um resumo pessoal.</p>
    </section>

    <section class="card">
      <h2>Editar perfil</h2>

      <label for="nameInput">Nome</label>
      <input id="nameInput" placeholder="Digite seu nome">

      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" placeholder="Digite seu email">

      <label for="summaryInput">Resumo / post pessoal</label>
      <textarea id="summaryInput" rows="6" placeholder="Escreva um resumo sobre você, seus interesses ou uma apresentação pessoal."></textarea>

      <div class="actions">
        <button id="saveBtn">Salvar perfil</button>
        <button id="clearBtn" class="secondary">Limpar</button>
      </div>

      <p id="message" class="message"></p>
    </section>

    <section class="card profile-card">
      <h2>Prévia do perfil</h2>
      <div id="profilePreview" class="profile-box">
        <p>Nenhum perfil preenchido ainda.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
